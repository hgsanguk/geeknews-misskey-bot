services:
  geeknews-misskey-bot:
    build: .
    container_name: geeknews-misskey-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/data/state.db').execute('SELECT 1').fetchone()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s